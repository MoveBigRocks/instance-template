# Fail2ban filter for Move Big Rocks analytics abuse
# Matches structured log lines emitted by the analytics ingest handler.
#
# Log line format (JSON structured logging):
#   {"level":"warn","msg":"analytics.bot", "ip":"1.2.3.4", ...}
#   {"level":"warn","msg":"analytics.ratelimit", "ip":"1.2.3.4", ...}
#   {"level":"warn","msg":"analytics.spam", "ip":"1.2.3.4", ...}
#   {"level":"warn","msg":"analytics.honeypot", "ip":"1.2.3.4", ...}

[Definition]
failregex = "msg"\s*:\s*"analytics\.(bot|ratelimit|spam|honeypot)".*"ip"\s*:\s*"<HOST>"
            "ip"\s*:\s*"<HOST>".*"msg"\s*:\s*"analytics\.(bot|ratelimit|spam|honeypot)"

ignoreregex =
