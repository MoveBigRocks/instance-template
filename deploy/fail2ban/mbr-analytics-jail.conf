# Fail2ban jail for Move Big Rocks analytics abuse
# Ban IPs that trigger analytics abuse detection (bots, rate limits, spam, honeypots).
#
# Install:
#   cp mbr-analytics.conf /etc/fail2ban/filter.d/
#   cp mbr-analytics-jail.conf /etc/fail2ban/jail.d/
#   systemctl reload fail2ban

[mbr-analytics]
enabled  = true
filter   = mbr-analytics
logpath  = /var/log/mbr/api.log
maxretry = 10
findtime = 300
bantime  = 3600
action   = iptables-multiport[name=mbr-analytics, port="80,443", protocol=tcp]
