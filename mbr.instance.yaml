apiVersion: mbr.demandops.com/v1alpha1
kind: MBRInstance
metadata:
  name: acme-prod
  instanceID: replace-with-generated-instance-id
spec:
  environment: production
  domain:
    app: app.example.com
    admin: admin.example.com
    api: api.example.com
    cookie: .example.com
  deployment:
    strategy: blue-green
    linuxTarget:
      host: replace-with-host
      rootDir: /opt/mbr
    release:
      core:
        version: v0.8.1
        servicesArtifact: ghcr.io/demandops/mbr-services:v0.8.1
        deployArtifact: ghcr.io/demandops/mbr-deploy:v0.8.1
        migrationsArtifact: ghcr.io/demandops/mbr-migrations:v0.8.1
        manifestArtifact: ghcr.io/demandops/mbr-manifest:v0.8.1
  auth:
    mode: magic-link
    breakGlassAdminEmail: owner@example.com
  email:
    outbound:
      provider: postmark
      fromEmail: support@example.com
      fromName: Example Support
      smtp:
        host: smtp.example.com
        port: 587
      ses:
        region: us-east-1
    inbound:
      mode: webhook
      provider: postmark
  storage:
    provider: s3-compatible
    region: ams3
    endpoint: https://ams3.digitaloceanspaces.com
    attachmentsBucket: mbr-attachments-example
  monitoring:
    internalHealth: true
    internalMetrics: true
  agent:
    bootstrap:
      createAdmin: true
      createWorkspace: true
      seedDefaults: true
      runThreatModelPrompt: true
  extensions:
    autoActivateAfterInstall: false
    desiredStateFile: extensions/desired-state.yaml
    policy:
      allowCustomExtensions: true
      allowMarketplaceExtensions: false
      genericRuntimeAllowedKinds:
        - product
        - operational
      genericRuntimeAllowedRisk:
        - standard
      requireThreatModelReview: true
      requireStagingValidation: true
      blockPrivilegedCustomExtensions: true
  branding:
    file: branding/site.json
  security:
    extensionThreatModelFile: security/extension-threat-model.md
    extensionReviewChecklistFile: security/review-checklist.md
